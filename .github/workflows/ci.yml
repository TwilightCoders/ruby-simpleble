name: CI

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop]

permissions:
  actions: write
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Focus on Windows only while stabilizing the build
        os: [windows-latest]
        ruby-version: ["2.7", "3.0", "3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress --limit-output
          # Install MSYS2 development tools for Ruby extensions
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake
        shell: bash

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdbus-1-dev cmake

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS uses system frameworks, no additional dependencies needed
          echo "Using system CoreBluetooth framework"

      - name: Compile extension (let extconf.rb handle everything)
        env:
          SIMPLEBLE_DEBUG: "1"
        shell: bash
        run: |
          echo "Ruby platform: $(ruby -e 'print RUBY_PLATFORM')"
          echo "🚀 Building SimpleBLE Ruby extension - extconf.rb will handle SimpleBLE build"
          bundle exec rake compile V=1 2>&1 | tee compile.log
          
          echo "--- Verify extension was built ---"
          ls -la ext/simpleble/ || true
          file ext/simpleble/simpleble.* || true

      - name: Upload compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log-${{ matrix.os }}-${{ matrix.ruby-version }}
          path: |
            compile.log
            ext/simpleble/Makefile
            ext/simpleble/*.o
            ext/simpleble/simpleble.*
          if-no-files-found: warn
          retention-days: 5

      - name: Run tests
        env:
          SIMPLEBLE_DEBUG: "1"
        run: bundle exec rspec --backtrace

      - name: Upload coverage artifact (Ruby 3.3, Ubuntu only)
        if: matrix.ruby-version == '3.3' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

      - name: Run RuboCop (Ruby 3.3, Ubuntu only)
        if: matrix.ruby-version == '3.3' && matrix.os == 'ubuntu-latest'
        run: bundle exec rubocop || true
        continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdbus-1-dev cmake

      - name: Run bundle audit
        run: |
          gem install bundler-audit
          bundle audit --update || true
        continue-on-error: true