name: CI

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Focus on Windows only while stabilizing the build
        os: [windows-latest]
        ruby-version: ["2.7", "3.0", "3.1", "3.2", "3.3"]
        include:
          # Keep platform-specific steps for future expansion
          - os: ubuntu-latest
            ruby-version: "3.3"
            install_deps: "sudo apt-get update && sudo apt-get install -y build-essential libdbus-1-dev cmake"
          - os: macos-latest
            ruby-version: "3.3"
            install_deps: "echo 'Using system CoreBluetooth framework'"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install system dependencies
        if: matrix.install_deps
        run: ${{ matrix.install_deps }}

      - name: Compile extension (let extconf.rb handle everything)
        env:
          SIMPLEBLE_DEBUG: "1"
        shell: bash
        run: |
          echo "Ruby platform: $(ruby -e 'print RUBY_PLATFORM')"
          echo "🚀 Building SimpleBLE Ruby extension - extconf.rb will handle SimpleBLE build"
          bundle exec rake compile V=1 2>&1 | tee compile.log
          
          echo "--- Verify extension was built ---"
          ls -la ext/simpleble/ || true
          file ext/simpleble/simpleble.* || true

      - name: Analyze Windows DLL dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== Windows DLL Dependency Analysis ==="
          echo "Analyzing SimpleBLE DLL dependencies to identify missing system libraries..."
          
          # Find Visual Studio installation for dumpbin
          DUMPBIN_PATH=$(find '/c/Program Files/Microsoft Visual Studio' -name 'dumpbin.exe' 2>/dev/null | head -1)
          if [ -n "$DUMPBIN_PATH" ]; then
            echo "Found dumpbin at: $DUMPBIN_PATH"
            
            echo "--- SimpleBLE-C DLL Dependencies ---"
            "$DUMPBIN_PATH" /dependents lib/simpleble/simpleble-c.dll || true
            
            echo "--- SimpleBLE Core DLL Dependencies ---" 
            "$DUMPBIN_PATH" /dependents lib/simpleble/simpleble.dll || true
            
            echo "--- Ruby Extension Dependencies ---"
            "$DUMPBIN_PATH" /dependents lib/simpleble/simpleble.so || true
          else
            echo "dumpbin not found, using PowerShell Get-Module method..."
            
            # Alternative: Use PowerShell to check DLL dependencies
            powershell -Command "
              Write-Host '--- Checking SimpleBLE-C DLL ---'
              try { Add-Type -Path 'lib/simpleble/simpleble-c.dll' } catch { Write-Host \"Error: \$_\" }
              
              Write-Host '--- Checking SimpleBLE Core DLL ---'  
              try { Add-Type -Path 'lib/simpleble/simpleble.dll' } catch { Write-Host \"Error: \$_\" }
              
              Write-Host '--- Checking Ruby Extension Loading ---'
              try { Add-Type -Path 'lib/simpleble/simpleble.so' } catch { Write-Host \"Error: \$_\" }
            " || true
          fi
          
          echo "--- Available System DLLs ---"
          echo "Checking for common Windows API DLLs that SimpleBLE might need..."
          ls -la /c/Windows/System32/ | grep -E "(api-ms-|bluetooth|winrt|ole32|oleaut32|ws2_32|iphlpapi|bcrypt|runtimeobject)" || true

      - name: Upload compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log-${{ matrix.os }}-${{ matrix.ruby-version }}
          path: |
            compile.log
            ext/simpleble/Makefile
            ext/simpleble/*.o
            ext/simpleble/simpleble.*
          if-no-files-found: warn
          retention-days: 5

      - name: Run tests
        env:
          SIMPLEBLE_DEBUG: "1"
        run: bundle exec rspec --backtrace

      - name: Run RuboCop (Ruby 3.3 only)
        if: matrix.ruby-version == '3.3'
        run: bundle exec rubocop || true
        continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdbus-1-dev cmake

      - name: Run bundle audit
        run: |
          gem install bundler-audit
          bundle audit --update || true
        continue-on-error: true